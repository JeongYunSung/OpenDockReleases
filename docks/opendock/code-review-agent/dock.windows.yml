opendock: 1
summary: PR-Agent CLI를 프로젝트 전용로 설치하고 근거 중심 코드 리뷰 사용 경로를 제공하는 도구 Dock.
readme: DOCK.md
logo: logo.png
tags:
  - code-review
  - pr-agent
  - review
  - quality
  - security
  - pull-request
requires:
  runtimes:
    python: ">=3.12.0 <3.14.0"
tools:
  pr-agent:
    manager: pip
    package: pr-agent
    version: "0.39.0"
    commands:
      - pr-agent
permissions:
  - pr-agent --help
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/AGENTS.md
    to: CLAUDE.md
  - from: files/AGENTS.md
    to: GEMINI.md
  - from: files/.opendock/docks/code-review-agent/README.md
    to: .opendock/docks/code-review-agent/README.md
  - from: files/.opendock/docks/code-review-agent/CODE_REVIEW.md
    to: .opendock/docks/code-review-agent/CODE_REVIEW.md
  - from: files/.opendock/docks/code-review-agent/CODE_REVIEW_RUN.md
    to: .opendock/docks/code-review-agent/CODE_REVIEW_RUN.md
doctor:
  - id: pr-agent-cli
    run: pr-agent --help
  - id: code-review-agent-docs
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/code-review-agent/README.md) { exit 0 } else { exit 1 }"
