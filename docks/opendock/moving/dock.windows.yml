opendock: 1
summary: 이사 일정, 견적, 서비스 이전, 물품과 치수, 예산 및 비상 계획을 근거와 함께 검증하는 품질 Dock.
readme: DOCK.md
logo: logo.png
tags:
  - moving
  - relocation
  - household
  - planning
  - checklist
  - budget
files:
  - from: files/.opendock/docks/moving/README.md
    to: .opendock/docks/moving/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/moving/MOVING_PLAYBOOK.md
    to: .opendock/docks/moving/MOVING_PLAYBOOK.md
  - from: files/.agents/skills/opendock-moving/SKILL.md
    to: .agents/skills/opendock-moving/SKILL.md
  - from: files/.opendock/templates/moving/RUN.md
    to: .opendock/templates/moving/RUN.md
doctor:
  - id: moving-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/moving/README.md) { exit 0 } else { exit 1 }"
  - id: moving-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: moving-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/moving/MOVING_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: moving-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-moving/SKILL.md) { exit 0 } else { exit 1 }"
  - id: moving-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/moving/RUN.md) { exit 0 } else { exit 1 }"
