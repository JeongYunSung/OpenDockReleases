doctor:
  - id: builder-contract
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath DOCK_BUILDER.md) { exit 0 } else { exit 1 }"
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: harness-script
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__dock-builder/check.mjs) { exit 0 } else { exit 1 }"
  - id: package-checker
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-dock-builder/scripts/check_dock_package.py) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-dock-builder/SKILL.md) { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-dock-builder/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: hook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/hooks/opendock-dock-builder/hook.json) { exit 0 } else { exit 1 }"
