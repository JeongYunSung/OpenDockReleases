opendock: 1
summary: 평소에는 필요한 범위만 빠르게 확인하고, 검수와 출시 전에는 Dock을 꼼꼼하게 점검하는 제작 도구.
readme: DOCK.md
logo: logo.png
tags:
  - dock
  - builder
  - registry
  - harness
  - security
  - release
requires:
