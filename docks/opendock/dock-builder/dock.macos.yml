doctor:
  - id: builder-contract
    check: test -f .opendock/docks/dock-builder/PLAYBOOK.md
  - id: builder-readme
    check: test -f .opendock/docks/dock-builder/README.md
  - id: harness-doc
    check: test -f .opendock/docks/dock-builder/HARNESS.md
  - id: harness-script
    check: test -f .opendock/harness/dock-builder/check.mjs
  - id: package-checker
    check: test -f .agents/skills/opendock-dock-builder/scripts/check_dock_package.py
  - id: skill
    check: test -f .agents/skills/opendock-dock-builder/SKILL.md
  - id: workflow
