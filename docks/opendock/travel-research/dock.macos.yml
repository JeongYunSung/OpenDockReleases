    to: .opendock/docks/travel-research/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/travel-research/TRAVEL_RESEARCH_PLAYBOOK.md
    to: .opendock/docks/travel-research/TRAVEL_RESEARCH_PLAYBOOK.md
  - from: files/.agents/skills/opendock-travel-research/SKILL.md
    to: .agents/skills/opendock-travel-research/SKILL.md
  - from: files/.opendock/templates/travel-research
    to: .opendock/templates/travel-research
doctor:
  - id: travel-research-readme
    check: test -f .opendock/docks/travel-research/README.md
  - id: travel-research-agents
    check: test -f AGENTS.md
  - id: travel-research-playbook
    check: test -f .opendock/docks/travel-research/TRAVEL_RESEARCH_PLAYBOOK.md
  - id: travel-research-skill
    check: test -f .agents/skills/opendock-travel-research/SKILL.md
  - id: travel-research-template
    check: test -f .opendock/templates/travel-research/RUN.md
