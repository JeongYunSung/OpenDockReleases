opendock: 1
id: opendock/mobile-ultrawork
summary: Mobile quality gate for Flutter, React Native, Swift, Android, permissions, accessibility, release readiness, and runtime safety.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - mobile
  - flutter
  - ios
  - android
commands:
  check:
    description: Run the mobile-ultrawork quality gate.
    file: .opendock/harness/opendock__mobile-ultrawork/check.mjs
    runner: node
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.opendock/harness/opendock__mobile-ultrawork/check.mjs
    to: .opendock/harness/opendock__mobile-ultrawork/check.mjs
  - from: files/.opendock/harness/opendock__mobile-ultrawork/check.sh
    to: .opendock/harness/opendock__mobile-ultrawork/check.sh
  - from: files/.opendock/harness/opendock__mobile-ultrawork/check.ps1
    to: .opendock/harness/opendock__mobile-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-mobile-ultrawork/SKILL.md
    to: .agents/skills/opendock-mobile-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-mobile-ultrawork.mdc
    to: .cursor/rules/opendock-mobile-ultrawork.mdc
  - from: files/.agents/workflows/opendock-mobile-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-mobile-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-mobile-ultrawork/quality-gate.md
    to: .claude/commands/opendock-mobile-ultrawork/quality-gate.md
  - from: files/.agents/hooks/opendock-mobile-ultrawork/hook.json
    to: .agents/hooks/opendock-mobile-ultrawork/hook.json
doctor:
  - id: harness-doc
    check: "node -e \"process.exit(require('node:fs').existsSync('HARNESS.md') ? 0 : 1)\""
  - id: harness-script
    check: "node -e \"process.exit(require('node:fs').existsSync('.opendock/harness/opendock__mobile-ultrawork/check.mjs') ? 0 : 1)\""
  - id: skill
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/skills/opendock-mobile-ultrawork/SKILL.md') ? 0 : 1)\""
  - id: workflow
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/workflows/opendock-mobile-ultrawork/quality-gate.md') ? 0 : 1)\""
  - id: hook
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/hooks/opendock-mobile-ultrawork/hook.json') ? 0 : 1)\""
