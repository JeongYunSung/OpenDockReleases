opendock: 1
summary: 회귀 범위, smoke test, security check, release confidence, 최종 handoff discipline을 점검하는 QA 품질 게이트.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - qa
  - testing
  - security
  - release
  - accessibility
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/.opendock/docks/qa-ultrawork/README.md
    to: .opendock/docks/qa-ultrawork/README.md
  - from: files/.opendock/docks/qa-ultrawork/HARNESS.md
    to: .opendock/docks/qa-ultrawork/HARNESS.md
  - from: files/.opendock/harness/qa-ultrawork/check.mjs
    to: .opendock/harness/qa-ultrawork/check.mjs
  - from: files/.opendock/harness/qa-ultrawork/check.sh
    to: .opendock/harness/qa-ultrawork/check.sh
  - from: files/.opendock/harness/qa-ultrawork/check.ps1
    to: .opendock/harness/qa-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-qa-ultrawork/SKILL.md
    to: .agents/skills/opendock-qa-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-qa-ultrawork.mdc
    to: .cursor/rules/opendock-qa-ultrawork.mdc
  - from: files/.agents/workflows/opendock-qa-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-qa-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-qa-ultrawork/quality-gate.md
    to: .claude/commands/opendock-qa-ultrawork/quality-gate.md
doctor:
  - id: dock-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/qa-ultrawork/README.md) { exit 0 } else { exit 1 }"
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/qa-ultrawork/HARNESS.md) { exit 0 } else { exit 1 }"
  - id: harness-script
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/qa-ultrawork/check.mjs) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-qa-ultrawork/SKILL.md) { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-qa-ultrawork/quality-gate.md) { exit 0 } else { exit 1 }"
