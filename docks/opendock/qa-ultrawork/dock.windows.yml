opendock: 1
id: opendock/qa-ultrawork
summary: QA quality gate for regression coverage, smoke tests, security checks, release confidence, and final handoff discipline.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - qa
  - testing
  - security
  - release
commands:
  check:
    description: Run the qa-ultrawork quality gate.
    file: .opendock/harness/opendock__qa-ultrawork/check.mjs
    runner: node
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.opendock/harness/opendock__qa-ultrawork/check.mjs
    to: .opendock/harness/opendock__qa-ultrawork/check.mjs
  - from: files/.opendock/harness/opendock__qa-ultrawork/check.sh
    to: .opendock/harness/opendock__qa-ultrawork/check.sh
  - from: files/.opendock/harness/opendock__qa-ultrawork/check.ps1
    to: .opendock/harness/opendock__qa-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-qa-ultrawork/SKILL.md
    to: .agents/skills/opendock-qa-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-qa-ultrawork.mdc
    to: .cursor/rules/opendock-qa-ultrawork.mdc
  - from: files/.agents/workflows/opendock-qa-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-qa-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-qa-ultrawork/quality-gate.md
    to: .claude/commands/opendock-qa-ultrawork/quality-gate.md
  - from: files/.agents/hooks/opendock-qa-ultrawork/hook.json
    to: .agents/hooks/opendock-qa-ultrawork/hook.json
doctor:
  - id: harness-doc
    check: "node -e \"process.exit(require('node:fs').existsSync('HARNESS.md') ? 0 : 1)\""
  - id: harness-script
    check: "node -e \"process.exit(require('node:fs').existsSync('.opendock/harness/opendock__qa-ultrawork/check.mjs') ? 0 : 1)\""
  - id: skill
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/skills/opendock-qa-ultrawork/SKILL.md') ? 0 : 1)\""
  - id: workflow
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/workflows/opendock-qa-ultrawork/quality-gate.md') ? 0 : 1)\""
  - id: hook
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/hooks/opendock-qa-ultrawork/hook.json') ? 0 : 1)\""
