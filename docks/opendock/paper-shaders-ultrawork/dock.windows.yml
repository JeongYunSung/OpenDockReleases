opendock: 1
summary: Paper Shaders의 29개 image filter, logo animation, effect를 정확한 props catalog와 하네스로 쓰게 하는 dock.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - paper-shaders
  - shader
  - react
  - design
  - animation
  - visual-effects
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
    npm: ">=10.0.0"
dependencies:
  paper-shaders-react:
    manager: npm
    path: .codex/opendock/paper-shaders-ultrawork
    mode: install
    timeout_ms: 600000
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/.opendock/docks/paper-shaders-ultrawork/README.md
    to: .opendock/docks/paper-shaders-ultrawork/README.md
  - from: files/.opendock/docks/paper-shaders-ultrawork/HARNESS.md
    to: .opendock/docks/paper-shaders-ultrawork/HARNESS.md
  - from: files/.opendock/docks/paper-shaders-ultrawork/PAPER_SHADERS.md
    to: .opendock/docks/paper-shaders-ultrawork/PAPER_SHADERS.md
  - from: files/.opendock/docks/paper-shaders-ultrawork/SHADER_PLAYBOOK.md
    to: .opendock/docks/paper-shaders-ultrawork/SHADER_PLAYBOOK.md
  - from: files/.codex/opendock/paper-shaders-ultrawork
    to: .codex/opendock/paper-shaders-ultrawork
  - from: files/.opendock/data/paper-shaders/catalog.json
    to: .opendock/data/paper-shaders/catalog.json
  - from: files/.opendock/templates/paper-shaders/PAPER_SHADER_RUN.md
    to: .opendock/templates/paper-shaders/PAPER_SHADER_RUN.md
  - from: files/.opendock/templates/paper-shaders/SHADER_REQUEST.md
    to: .opendock/templates/paper-shaders/SHADER_REQUEST.md
  - from: files/.opendock/harness/paper-shaders-ultrawork/check.mjs
    to: .opendock/harness/paper-shaders-ultrawork/check.mjs
  - from: files/.opendock/harness/paper-shaders-ultrawork/check.sh
    to: .opendock/harness/paper-shaders-ultrawork/check.sh
  - from: files/.opendock/harness/paper-shaders-ultrawork/check.ps1
    to: .opendock/harness/paper-shaders-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-paper-shaders-ultrawork/SKILL.md
    to: .agents/skills/opendock-paper-shaders-ultrawork/SKILL.md
  - from: files/.agents/workflows/opendock-paper-shaders-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-paper-shaders-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-paper-shaders-ultrawork/quality-gate.md
    to: .claude/commands/opendock-paper-shaders-ultrawork/quality-gate.md
  - from: files/.cursor/rules/opendock-paper-shaders-ultrawork.mdc
    to: .cursor/rules/opendock-paper-shaders-ultrawork.mdc
doctor:
  - id: dock-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/paper-shaders-ultrawork/README.md) { exit 0 } else { exit 1 }"
  - id: paper-shaders-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/paper-shaders-ultrawork/PAPER_SHADERS.md) { exit 0 } else { exit 1 }"
  - id: catalog-json
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/data/paper-shaders/catalog.json) { exit 0 } else { exit 1 }"
  - id: shader-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/paper-shaders-ultrawork/SHADER_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: runtime-package-json
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .codex/opendock/paper-shaders-ultrawork/package.json) { exit 0 } else { exit 1 }"
  - id: runtime-package-installed
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .codex/opendock/paper-shaders-ultrawork/node_modules/@paper-design/shaders-react) { exit 0 } else { exit 1 }"
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/paper-shaders-ultrawork/HARNESS.md) { exit 0 } else { exit 1 }"
  - id: harness-script
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/paper-shaders-ultrawork/check.mjs) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/paper-shaders/PAPER_SHADER_RUN.md) { exit 0 } else { exit 1 }"
  - id: request-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/paper-shaders/SHADER_REQUEST.md) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-paper-shaders-ultrawork/SKILL.md) { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-paper-shaders-ultrawork/quality-gate.md) { exit 0 } else { exit 1 }"
