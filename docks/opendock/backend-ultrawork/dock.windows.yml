opendock: 1
id: opendock/backend-ultrawork
summary: Backend quality gate for API contracts, validation, authentication, migrations, logging, and service safety.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - backend
  - api
  - security
  - harness
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.opendock/harness/opendock__backend-ultrawork/check.mjs
    to: .opendock/harness/opendock__backend-ultrawork/check.mjs
  - from: files/.opendock/harness/opendock__backend-ultrawork/check.sh
    to: .opendock/harness/opendock__backend-ultrawork/check.sh
  - from: files/.opendock/harness/opendock__backend-ultrawork/check.ps1
    to: .opendock/harness/opendock__backend-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-backend-ultrawork/SKILL.md
    to: .agents/skills/opendock-backend-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-backend-ultrawork.mdc
    to: .cursor/rules/opendock-backend-ultrawork.mdc
  - from: files/.agents/workflows/opendock-backend-ultrawork/quality-gate.md
