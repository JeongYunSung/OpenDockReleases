opendock: 1
summary: 창업 가설을 출처, 인터뷰, pass/fail 기준, MVP와 다음 결정으로 연결하는 검증 dock.
readme: DOCK.md
logo: logo.png
tags:
  - startup
  - validation
  - customer-discovery
  - mvp
  - pricing
  - research
files:
  - from: files/.opendock/docks/startup-validator/README.md
    to: .opendock/docks/startup-validator/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/startup-validator/STARTUP_VALIDATION_PLAYBOOK.md
    to: .opendock/docks/startup-validator/STARTUP_VALIDATION_PLAYBOOK.md
  - from: files/.agents/skills/opendock-startup-validator/SKILL.md
    to: .agents/skills/opendock-startup-validator/SKILL.md
  - from: files/.opendock/templates/startup-validator/RUN.md
    to: .opendock/templates/startup-validator/RUN.md
doctor:
  - id: startup-validator-readme
    check: test -f .opendock/docks/startup-validator/README.md
  - id: startup-validator-agents
    check: test -f AGENTS.md
  - id: startup-validator-playbook
    check: test -f .opendock/docks/startup-validator/STARTUP_VALIDATION_PLAYBOOK.md
  - id: startup-validator-skill
    check: test -f .agents/skills/opendock-startup-validator/SKILL.md
  - id: startup-validator-run-template
    check: test -f .opendock/templates/startup-validator/RUN.md
