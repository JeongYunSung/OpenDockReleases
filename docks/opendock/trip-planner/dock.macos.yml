opendock: 1
summary: 여행 조건을 현실적인 동선, 예산, 예약 점검, 우천 대안과 안전 계획으로 바꾸는 품질 게이트.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - trip-planning
  - itinerary
  - budget
  - safety
  - research
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/TRIP_PLANNING_PLAYBOOK.md
    to: TRIP_PLANNING_PLAYBOOK.md
  - from: files/.agents/skills/opendock-trip-planner/SKILL.md
    to: .agents/skills/opendock-trip-planner/SKILL.md
  - from: files/.agents/workflows/opendock-trip-planner/quality-gate.md
    to: .agents/workflows/opendock-trip-planner/quality-gate.md
  - from: files/.opendock/templates/trip-planner
    to: .opendock/templates/trip-planner
  - from: files/.opendock/harness/opendock__trip-planner
    to: .opendock/harness/opendock__trip-planner
doctor:
  - id: trip-planner-readme
    check: test -f README.md
  - id: trip-planner-agents
    check: test -f AGENTS.md
  - id: trip-planner-harness-doc
    check: test -f HARNESS.md
  - id: trip-planner-playbook
    check: test -f TRIP_PLANNING_PLAYBOOK.md
  - id: trip-planner-skill
    check: test -f .agents/skills/opendock-trip-planner/SKILL.md
  - id: trip-planner-workflow
    check: test -f .agents/workflows/opendock-trip-planner/quality-gate.md
  - id: trip-planner-template
    check: test -f .opendock/templates/trip-planner/RUN.md
  - id: trip-planner-harness
    check: test -f .opendock/harness/opendock__trip-planner/check.mjs
