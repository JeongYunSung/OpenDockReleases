opendock: 1
summary: 여행 조건을 현실적인 동선, 예산, 예약 점검, 우천 대안과 안전 계획으로 바꾸는 여행 계획 dock.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - trip-planning
  - itinerary
  - budget
  - safety
  - research
files:
  - from: files/.opendock/docks/trip-planner/README.md
    to: .opendock/docks/trip-planner/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/trip-planner/TRIP_PLANNING_PLAYBOOK.md
    to: .opendock/docks/trip-planner/TRIP_PLANNING_PLAYBOOK.md
  - from: files/.agents/skills/opendock-trip-planner/SKILL.md
    to: .agents/skills/opendock-trip-planner/SKILL.md
  - from: files/.opendock/templates/trip-planner
    to: .opendock/templates/trip-planner
doctor:
  - id: trip-planner-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/trip-planner/README.md) { exit 0 } else { exit 1 }"
  - id: trip-planner-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: trip-planner-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/trip-planner/TRIP_PLANNING_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: trip-planner-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-trip-planner/SKILL.md) { exit 0 } else { exit 1 }"
  - id: trip-planner-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/trip-planner/RUN.md) { exit 0 } else { exit 1 }"
