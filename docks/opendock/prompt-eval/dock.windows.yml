opendock: 1
summary: promptfoo CLI를 프로젝트 전용로 설치해 프롬프트, AI 도구, RAG 응답을 평가하는 도구 Dock.
readme: DOCK.md
logo: logo.png
tags:
  - prompt-eval
  - promptfoo
  - evaluation
  - red-team
  - ai-quality
  - testing
requires:
  runtimes:
    node: ">=22.22.0 <25.0.0"
    npm: ">=10.0.0"
tools:
  promptfoo:
    manager: npm
    package: promptfoo
    version: "0.121.17"
    commands:
      - promptfoo
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/AGENTS.md
    to: CLAUDE.md
  - from: files/AGENTS.md
    to: GEMINI.md
  - from: files/.opendock/docks/prompt-eval/README.md
    to: .opendock/docks/prompt-eval/README.md
  - from: files/.opendock/docks/prompt-eval/PROMPT_EVAL.md
    to: .opendock/docks/prompt-eval/PROMPT_EVAL.md
  - from: files/.opendock/docks/prompt-eval/PROMPT_EVAL_RUN.md
    to: .opendock/docks/prompt-eval/PROMPT_EVAL_RUN.md
doctor:
  - id: promptfoo-cli
    run: promptfoo --version
  - id: prompt-eval-docs
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/prompt-eval/README.md) { exit 0 } else { exit 1 }"
