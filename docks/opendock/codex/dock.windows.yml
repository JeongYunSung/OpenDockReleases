opendock: 1
id: opendock/codex
summary: Tool dock for installing the Codex CLI without project payloads.
readme: DOCK.md
logo: logo.png
tags:
  - codex
  - tool
  - ai-agent
requires:
  runtimes:
    node: ">=22.0.0"
    npm: ">=10.0.0"
install:
  - id: install-codex
    run: npm install --global @openai/codex@latest
    timeout_ms: 600000
update:
  - id: update-codex
    run: npm install --global @openai/codex@latest
    timeout_ms: 600000
doctor:
  - id: check-codex
    run: codex --version
