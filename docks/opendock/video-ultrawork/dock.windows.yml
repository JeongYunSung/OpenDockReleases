opendock: 1
summary: 로컬 영상의 검사, 트림, 변환, 자막 삽입, 썸네일 생성, Lanczos 업스케일을 안전하게 수행하고 검증하는 dock.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - video
  - ffmpeg
  - media-metadata
  - subtitle
  - thumbnail
  - upscale
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
    npm: ">=10.0.0"
dependencies:
  video-helper:
    manager: npm
    path: .codex/opendock/video-ultrawork
    mode: locked
    timeout_ms: 600000
    integrity:
      - path: node_modules/node-av/binary/ffmpeg.exe
        sha256:
          - d06c45704cd247744f83fc1ed8e005ce1d1b8f84b0c4acd8e17a7c1b8a202b0a
          - c485e0283b46f5b3a5b79120daa7583217e00db2534ecb3a4be048e902e75399
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/VIDEO_PLAYBOOK.md
    to: VIDEO_PLAYBOOK.md
  - from: files/.codex/opendock/video-ultrawork
    to: .codex/opendock/video-ultrawork
  - from: files/.opendock/templates/video/VIDEO_RUN.md
    to: .opendock/templates/video/VIDEO_RUN.md
  - from: files/.opendock/harness/opendock__video-ultrawork
    to: .opendock/harness/opendock__video-ultrawork
  - from: files/.agents/skills/opendock-video-ultrawork/SKILL.md
    to: .agents/skills/opendock-video-ultrawork/SKILL.md
  - from: files/.agents/workflows/opendock-video-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-video-ultrawork/quality-gate.md
doctor:
  - id: video-playbook
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath VIDEO_PLAYBOOK.md) { exit 0 } else { exit 1 }"'
  - id: video-helper
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .codex/opendock/video-ultrawork/video-helper.mjs) { exit 0 } else { exit 1 }"'
  - id: ffmpeg-dependency
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .codex/opendock/video-ultrawork/node_modules/node-av/binary/ffmpeg.exe) { exit 0 } else { exit 1 }"'
  - id: ffmpeg-integrity
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .codex/opendock/video-ultrawork/node_modules/node-av/binary/.opendock-verified.json) { exit 0 } else { exit 1 }"'
  - id: mediainfo-dependency
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .codex/opendock/video-ultrawork/node_modules/mediainfo.js) { exit 0 } else { exit 1 }"'
  - id: video-harness
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__video-ultrawork/check.mjs) { exit 0 } else { exit 1 }"'
  - id: video-run-template
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/video/VIDEO_RUN.md) { exit 0 } else { exit 1 }"'
  - id: video-skill
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-video-ultrawork/SKILL.md) { exit 0 } else { exit 1 }"'
  - id: video-workflow
    check: 'powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-video-ultrawork/quality-gate.md) { exit 0 } else { exit 1 }"'
