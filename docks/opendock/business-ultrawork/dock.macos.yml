opendock: 1
id: opendock/business-ultrawork
summary: Business quality gate for PRDs, user stories, GTM, ICP, pricing, marketing claims, evidence, and release notes.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - product
  - founder
  - marketing
  - gtm
commands:
  check:
    description: Run the business-ultrawork quality gate.
    file: .opendock/harness/opendock__business-ultrawork/check.mjs
    runner: node
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.opendock/harness/opendock__business-ultrawork/check.mjs
    to: .opendock/harness/opendock__business-ultrawork/check.mjs
  - from: files/.opendock/harness/opendock__business-ultrawork/check.sh
    to: .opendock/harness/opendock__business-ultrawork/check.sh
  - from: files/.opendock/harness/opendock__business-ultrawork/check.ps1
    to: .opendock/harness/opendock__business-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-business-ultrawork/SKILL.md
    to: .agents/skills/opendock-business-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-business-ultrawork.mdc
    to: .cursor/rules/opendock-business-ultrawork.mdc
  - from: files/.agents/workflows/opendock-business-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-business-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-business-ultrawork/quality-gate.md
    to: .claude/commands/opendock-business-ultrawork/quality-gate.md
  - from: files/.agents/hooks/opendock-business-ultrawork/hook.json
    to: .agents/hooks/opendock-business-ultrawork/hook.json
doctor:
  - id: harness-doc
    check: test -f HARNESS.md
  - id: harness-script
    check: test -f .opendock/harness/opendock__business-ultrawork/check.mjs
  - id: skill
    check: test -f .agents/skills/opendock-business-ultrawork/SKILL.md
  - id: workflow
    check: test -f .agents/workflows/opendock-business-ultrawork/quality-gate.md
  - id: hook
    check: test -f .agents/hooks/opendock-business-ultrawork/hook.json
