opendock: 1
summary: 블로그, 뉴스레터, 유튜브 스크립트, 썸네일 브리프, 업로드 체크리스트를 운영 가능한 콘텐츠 패키지로 정리하는 dock.
readme: DOCK.md
logo: logo.png
tags:
  - content
  - creator
  - blog
  - newsletter
  - youtube
  - script
  - thumbnail
  - calendar
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/AGENTS.md
    to: CLAUDE.md
  - from: files/AGENTS.md
    to: GEMINI.md
  - from: files/.opendock/docks/content-creator/README.md
    to: .opendock/docks/content-creator/README.md
  - from: files/.opendock/docks/content-creator/CONTENT_CREATOR.md
    to: .opendock/docks/content-creator/CONTENT_CREATOR.md
  - from: files/.opendock/templates/content-creator/CONTENT_RUN.md
    to: .opendock/templates/content-creator/CONTENT_RUN.md
  - from: files/.agents/skills/opendock-content-creator/SKILL.md
    to: .agents/skills/opendock-content-creator/SKILL.md
doctor:
  - id: readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/content-creator/README.md) { exit 0 } else { exit 1 }"
  - id: domain-guide
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/content-creator/CONTENT_CREATOR.md) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/content-creator/CONTENT_RUN.md) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-content-creator/SKILL.md) { exit 0 } else { exit 1 }"
