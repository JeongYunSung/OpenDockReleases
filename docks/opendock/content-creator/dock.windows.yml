opendock: 1
summary: 블로그, 뉴스레터, 유튜브 스크립트, 썸네일 브리프, 업로드 체크리스트를 운영 가능한 콘텐츠 패키지로 정리하는 dock.
readme: DOCK.md
logo: logo.png
tags:
  - content
  - creator
  - blog
  - newsletter
  - youtube
  - script
  - thumbnail
  - calendar
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/CONTENT_CREATOR.md
    to: CONTENT_CREATOR.md
  - from: files/.opendock/templates/content-creator/CONTENT_RUN.md
    to: .opendock/templates/content-creator/CONTENT_RUN.md
  - from: files/.opendock/harness/opendock__content-creator/check.mjs
    to: .opendock/harness/opendock__content-creator/check.mjs
  - from: files/.opendock/harness/opendock__content-creator/check.sh
    to: .opendock/harness/opendock__content-creator/check.sh
