  - from: files/.agents/hooks/opendock-content-creator/hook.json
    to: .agents/hooks/opendock-content-creator/hook.json
doctor:
  - id: domain-guide
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath CONTENT_CREATOR.md) { exit 0 } else { exit 1 }"
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/content-creator/CONTENT_RUN.md) { exit 0 } else { exit 1 }"
  - id: harness-script
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__content-creator/check.mjs) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-content-creator/SKILL.md) { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-content-creator/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: hook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/hooks/opendock-content-creator/hook.json) { exit 0 } else { exit 1 }"
