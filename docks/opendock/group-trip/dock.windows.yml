opendock: 1
summary: 구성원별 선호·제약·예산을 투명한 tradeoff, 공정한 결정과 비용 배분으로 연결하는 공동 여행 품질 게이트.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - group-trip
  - consensus
  - budgeting
  - accessibility
  - planning
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/GROUP_TRIP_PLAYBOOK.md
    to: GROUP_TRIP_PLAYBOOK.md
  - from: files/.agents/skills/opendock-group-trip/SKILL.md
    to: .agents/skills/opendock-group-trip/SKILL.md
  - from: files/.agents/workflows/opendock-group-trip/quality-gate.md
    to: .agents/workflows/opendock-group-trip/quality-gate.md
  - from: files/.opendock/templates/group-trip
    to: .opendock/templates/group-trip
  - from: files/.opendock/harness/opendock__group-trip
    to: .opendock/harness/opendock__group-trip
doctor:
  - id: group-trip-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath README.md) { exit 0 } else { exit 1 }"
  - id: group-trip-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: group-trip-harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: group-trip-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath GROUP_TRIP_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: group-trip-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-group-trip/SKILL.md) { exit 0 } else { exit 1 }"
  - id: group-trip-workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-group-trip/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: group-trip-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/group-trip/RUN.md) { exit 0 } else { exit 1 }"
  - id: group-trip-harness
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__group-trip/check.mjs) { exit 0 } else { exit 1 }"
