opendock: 1
summary: 구성원별 선호·제약·예산을 투명한 tradeoff, 공정한 결정과 비용 배분으로 연결하는 공동 여행 계획 Dock.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - group-trip
  - consensus
  - budgeting
  - accessibility
  - planning
files:
  - from: files/.opendock/docks/group-trip/README.md
    to: .opendock/docks/group-trip/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/group-trip/GROUP_TRIP_PLAYBOOK.md
    to: .opendock/docks/group-trip/GROUP_TRIP_PLAYBOOK.md
  - from: files/.agents/skills/opendock-group-trip/SKILL.md
    to: .agents/skills/opendock-group-trip/SKILL.md
  - from: files/.opendock/templates/group-trip
    to: .opendock/templates/group-trip
doctor:
  - id: group-trip-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/group-trip/README.md) { exit 0 } else { exit 1 }"
  - id: group-trip-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: group-trip-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/group-trip/GROUP_TRIP_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: group-trip-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-group-trip/SKILL.md) { exit 0 } else { exit 1 }"
  - id: group-trip-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/group-trip/RUN.md) { exit 0 } else { exit 1 }"
