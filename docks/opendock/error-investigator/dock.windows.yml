opendock: 1
summary: 재현 증거, 가설 실험, 근본 원인, 최소 수정과 회귀 테스트를 현재 오류 조사 보고서에서 검증합니다.
readme: DOCK.md
logo: logo.png
tags:
  - debugging
  - incident-analysis
  - root-cause
  - regression-test
  - safety
  - harness
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/ERROR_INVESTIGATION_PLAYBOOK.md
    to: ERROR_INVESTIGATION_PLAYBOOK.md
  - from: files/.agents/skills/opendock-error-investigator/SKILL.md
    to: .agents/skills/opendock-error-investigator/SKILL.md
  - from: files/.agents/workflows/opendock-error-investigator/quality-gate.md
    to: .agents/workflows/opendock-error-investigator/quality-gate.md
  - from: files/.opendock/templates/error-investigator/RUN.md
    to: .opendock/templates/error-investigator/RUN.md
  - from: files/.opendock/harness/opendock__error-investigator/check.mjs
    to: .opendock/harness/opendock__error-investigator/check.mjs
doctor:
  - id: readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath README.md) { exit 0 } else { exit 1 }"
  - id: agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath ERROR_INVESTIGATION_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-error-investigator/SKILL.md) { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-error-investigator/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/error-investigator/RUN.md) { exit 0 } else { exit 1 }"
  - id: harness
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__error-investigator/check.mjs) { exit 0 } else { exit 1 }"

