opendock: 1
summary: 재현 증거, 가설 실험, 근본 원인, 최소 수정과 회귀 테스트를 현재 오류 조사 보고서에서 검증합니다.
readme: DOCK.md
logo: logo.png
tags:
  - debugging
  - incident-analysis
  - root-cause
  - regression-test
  - safety
files:
  - from: files/.opendock/docks/error-investigator/README.md
    to: .opendock/docks/error-investigator/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/error-investigator/ERROR_INVESTIGATION_PLAYBOOK.md
    to: .opendock/docks/error-investigator/ERROR_INVESTIGATION_PLAYBOOK.md
  - from: files/.agents/skills/opendock-error-investigator/SKILL.md
    to: .agents/skills/opendock-error-investigator/SKILL.md
  - from: files/.opendock/templates/error-investigator/RUN.md
    to: .opendock/templates/error-investigator/RUN.md
doctor:
  - id: readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/error-investigator/README.md) { exit 0 } else { exit 1 }"
  - id: agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/error-investigator/ERROR_INVESTIGATION_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-error-investigator/SKILL.md) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/error-investigator/RUN.md) { exit 0 } else { exit 1 }"
