[tools]
node = "24"
bun = "1.3"
python = "3.13"

[env]
_.file = ".env.local"

[tasks.install]
description = "Install project dependencies"
run = "bun install"

[tasks.lint]
description = "Run lint checks"
run = "bun run lint"

[tasks.test]
description = "Run tests"
run = "bun run test"

[tasks.build]
description = "Build the project"
run = "bun run build"

[tasks.doctor]
description = "Run the standard project verification sequence"
depends = ["lint", "test", "build"]
