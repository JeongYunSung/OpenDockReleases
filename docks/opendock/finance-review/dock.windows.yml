opendock: 1
summary: 수입, 지출, 반복 결제, 목표와 예산 차이를 개인정보 없는 집계로 검토하는 교육용 budgeting dock.
readme: DOCK.md
logo: logo.png
tags:
  - finance
  - budgeting
  - spending
  - income
  - recurring
  - privacy
  - review
files:
  - from: files/.opendock/docks/finance-review/README.md
    to: .opendock/docks/finance-review/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/finance-review/FINANCE_REVIEW_PLAYBOOK.md
    to: .opendock/docks/finance-review/FINANCE_REVIEW_PLAYBOOK.md
  - from: files/.agents/skills/opendock-finance-review/SKILL.md
    to: .agents/skills/opendock-finance-review/SKILL.md
  - from: files/.opendock/templates/finance-review
    to: .opendock/templates/finance-review
doctor:
  - id: finance-review-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/finance-review/README.md) { exit 0 } else { exit 1 }"
  - id: finance-review-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: finance-review-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/finance-review/FINANCE_REVIEW_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: finance-review-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-finance-review/SKILL.md) { exit 0 } else { exit 1 }"
  - id: finance-review-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/finance-review/RUN.md) { exit 0 } else { exit 1 }"
