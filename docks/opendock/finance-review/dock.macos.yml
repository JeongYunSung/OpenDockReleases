opendock: 1
summary: 수입, 지출, 반복 결제, 목표와 예산 차이를 개인정보 없는 집계로 검토하는 교육용 budgeting dock.
readme: DOCK.md
logo: logo.png
tags:
  - finance
  - budgeting
  - spending
  - income
  - recurring
  - privacy
  - review
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/FINANCE_REVIEW_PLAYBOOK.md
    to: FINANCE_REVIEW_PLAYBOOK.md
  - from: files/.agents/skills/opendock-finance-review/SKILL.md
    to: .agents/skills/opendock-finance-review/SKILL.md
  - from: files/.agents/workflows/opendock-finance-review/quality-gate.md
    to: .agents/workflows/opendock-finance-review/quality-gate.md
  - from: files/.opendock/templates/finance-review
    to: .opendock/templates/finance-review
  - from: files/.opendock/harness/opendock__finance-review
    to: .opendock/harness/opendock__finance-review
doctor:
  - id: finance-review-readme
    check: test -f README.md
  - id: finance-review-agents
    check: test -f AGENTS.md
  - id: finance-review-harness-doc
    check: test -f HARNESS.md
  - id: finance-review-playbook
    check: test -f FINANCE_REVIEW_PLAYBOOK.md
  - id: finance-review-skill
    check: test -f .agents/skills/opendock-finance-review/SKILL.md
  - id: finance-review-workflow
    check: test -f .agents/workflows/opendock-finance-review/quality-gate.md
  - id: finance-review-run-template
    check: test -f .opendock/templates/finance-review/RUN.md
  - id: finance-review-harness
    check: test -f .opendock/harness/opendock__finance-review/check.mjs

