opendock: 1
summary: 문제 정의부터 요구사항, acceptance criteria, metric과 decision log까지 검증하는 PM 문서 workspace.
readme: DOCK.md
logo: logo.png
tags:
  - product-management
  - prd
  - requirements
  - user-stories
  - decisions
  - quality-gate
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/PM_WORKSPACE_PLAYBOOK.md
    to: PM_WORKSPACE_PLAYBOOK.md
  - from: files/.agents/skills/opendock-pm-workspace/SKILL.md
    to: .agents/skills/opendock-pm-workspace/SKILL.md
  - from: files/.agents/workflows/opendock-pm-workspace/quality-gate.md
    to: .agents/workflows/opendock-pm-workspace/quality-gate.md
  - from: files/.opendock/templates/pm-workspace/RUN.md
    to: .opendock/templates/pm-workspace/RUN.md
  - from: files/.opendock/harness/opendock__pm-workspace/check.mjs
    to: .opendock/harness/opendock__pm-workspace/check.mjs
doctor:
  - id: pm-workspace-readme
    check: test -f README.md
  - id: pm-workspace-agents
    check: test -f AGENTS.md
  - id: pm-workspace-harness-doc
    check: test -f HARNESS.md
  - id: pm-workspace-playbook
    check: test -f PM_WORKSPACE_PLAYBOOK.md
  - id: pm-workspace-skill
    check: test -f .agents/skills/opendock-pm-workspace/SKILL.md
  - id: pm-workspace-workflow
    check: test -f .agents/workflows/opendock-pm-workspace/quality-gate.md
  - id: pm-workspace-run-template
    check: test -f .opendock/templates/pm-workspace/RUN.md
  - id: pm-workspace-harness
    check: test -f .opendock/harness/opendock__pm-workspace/check.mjs
