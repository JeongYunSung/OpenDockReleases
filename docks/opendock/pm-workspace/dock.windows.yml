opendock: 1
summary: 문제 정의부터 요구사항, acceptance criteria, metric과 decision log까지 검증하는 PM 문서 작업 공간.
readme: DOCK.md
logo: logo.png
tags:
  - product-management
  - prd
  - requirements
  - user-stories
  - decisions
files:
  - from: files/.opendock/docks/pm-workspace/README.md
    to: .opendock/docks/pm-workspace/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/pm-workspace/PM_WORKSPACE_PLAYBOOK.md
    to: .opendock/docks/pm-workspace/PM_WORKSPACE_PLAYBOOK.md
  - from: files/.agents/skills/opendock-pm-workspace/SKILL.md
    to: .agents/skills/opendock-pm-workspace/SKILL.md
  - from: files/.opendock/templates/pm-workspace/RUN.md
    to: .opendock/templates/pm-workspace/RUN.md
doctor:
  - id: pm-workspace-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/pm-workspace/README.md) { exit 0 } else { exit 1 }"
  - id: pm-workspace-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: pm-workspace-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/pm-workspace/PM_WORKSPACE_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: pm-workspace-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-pm-workspace/SKILL.md) { exit 0 } else { exit 1 }"
  - id: pm-workspace-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/pm-workspace/RUN.md) { exit 0 } else { exit 1 }"
