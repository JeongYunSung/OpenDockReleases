    to: .opendock/docks/travel-journal/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/travel-journal/TRAVEL_JOURNAL_PLAYBOOK.md
    to: .opendock/docks/travel-journal/TRAVEL_JOURNAL_PLAYBOOK.md
  - from: files/.agents/skills/opendock-travel-journal/SKILL.md
    to: .agents/skills/opendock-travel-journal/SKILL.md
  - from: files/.opendock/templates/travel-journal
    to: .opendock/templates/travel-journal
doctor:
  - id: travel-journal-readme
    check: test -f .opendock/docks/travel-journal/README.md
  - id: travel-journal-agents
    check: test -f AGENTS.md
  - id: travel-journal-playbook
    check: test -f .opendock/docks/travel-journal/TRAVEL_JOURNAL_PLAYBOOK.md
  - id: travel-journal-skill
    check: test -f .agents/skills/opendock-travel-journal/SKILL.md
  - id: travel-journal-template
    check: test -f .opendock/templates/travel-journal/RUN.md
