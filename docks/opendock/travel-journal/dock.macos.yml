opendock: 1
summary: 사진·메모를 시간선, 캡션, 회고와 여러 이야기 변형으로 정리하면서 동의·불확실성·개인정보 가림을 지키는 여행 기록 dock.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - journal
  - storytelling
  - photos
  - privacy
  - writing
files:
