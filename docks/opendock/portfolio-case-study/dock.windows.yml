opendock: 1
summary: 실제 근거, 의사결정, 결과와 회고를 과장 없이 연결하고 개인정보를 안전하게 비식별화하는 포트폴리오 사례 연구 dock.
readme: DOCK.md
logo: logo.png
tags:
  - portfolio
  - case-study
  - storytelling
  - evidence
  - privacy
  - writing
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/PORTFOLIO_CASE_STUDY_PLAYBOOK.md
    to: PORTFOLIO_CASE_STUDY_PLAYBOOK.md
  - from: files/.agents/skills/opendock-portfolio-case-study/SKILL.md
    to: .agents/skills/opendock-portfolio-case-study/SKILL.md
  - from: files/.agents/workflows/opendock-portfolio-case-study/quality-gate.md
    to: .agents/workflows/opendock-portfolio-case-study/quality-gate.md
  - from: files/.opendock/templates/portfolio-case-study/RUN.md
    to: .opendock/templates/portfolio-case-study/RUN.md
  - from: files/.opendock/harness/opendock__portfolio-case-study/check.mjs
    to: .opendock/harness/opendock__portfolio-case-study/check.mjs
doctor:
  - id: portfolio-case-study-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath README.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath PORTFOLIO_CASE_STUDY_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-portfolio-case-study/SKILL.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-portfolio-case-study/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/portfolio-case-study/RUN.md) { exit 0 } else { exit 1 }"
  - id: portfolio-case-study-harness-script
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__portfolio-case-study/check.mjs) { exit 0 } else { exit 1 }"
