opendock: 1
id: opendock/oma
summary: Oh My Agent setup with OpenDock-managed install, update, and uninstall.
readme: DOCK.md
logo: logo.png
tags:
  - oma
  - oh-my-agent
  - ai-agent
  - automation
requires:
  runtimes:
    bun: ">=1.3.0"
workdir:
  files:
    - from: workdir/oma-config.yaml
      to: .agents/oma-config.yaml
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/PROMPTS.md
    to: PROMPTS.md
install:
  - id: install-oma
    run: bun install --global oh-my-agent@latest
    timeout_ms: 600000
  - id: apply-oma
    run: oma -y install
    workdir: dock
    timeout_ms: 600000
  - id: link-oma-vendors
    run: oma link claude codex
    workdir: dock
    export:
      include:
        - AGENTS.md
        - CLAUDE.md
        - GEMINI.md
        - QWEN.md
        - .agents/**
        - .codex/**
        - .claude/**
        - .cursor/**
        - .github/copilot-instructions.md
        - .github/instructions/**
        - .kiro/**
        - .qwen/**
      exclude:
        - "**/*.log"
        - "**/cache/**"
        - "**/.DS_Store"
    timeout_ms: 600000
update:
  - id: update-oma-package
    run: bun install --global oh-my-agent@latest
    timeout_ms: 600000
  - id: update-oma
    run: oma -y install
    workdir: dock
    timeout_ms: 600000
  - id: relink-oma-vendors
    run: oma link claude codex
    workdir: dock
    export:
      include:
        - AGENTS.md
        - CLAUDE.md
        - GEMINI.md
        - QWEN.md
        - .agents/**
        - .codex/**
        - .claude/**
        - .cursor/**
        - .github/copilot-instructions.md
        - .github/instructions/**
        - .kiro/**
        - .qwen/**
      exclude:
        - "**/*.log"
        - "**/cache/**"
        - "**/.DS_Store"
    timeout_ms: 600000
doctor:
  - id: check-oma
    run: oma doctor
    workdir: root
    timeout_ms: 60000
