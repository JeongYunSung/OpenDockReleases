opendock: 1
summary: 원칙, semantic token, component state, 접근성, 거버넌스와 도입 계획을 연결해 운영 가능한 디자인 시스템을 설계하는 dock.
readme: DOCK.md
logo: logo.png
tags:
  - design-system
  - tokens
  - components
  - accessibility
  - governance
  - adoption
files:
  - from: files/.opendock/docks/design-system/README.md
    to: .opendock/docks/design-system/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/design-system/DESIGN_SYSTEM_PLAYBOOK.md
    to: .opendock/docks/design-system/DESIGN_SYSTEM_PLAYBOOK.md
  - from: files/.agents/skills/opendock-design-system/SKILL.md
    to: .agents/skills/opendock-design-system/SKILL.md
  - from: files/.opendock/templates/design-system/RUN.md
    to: .opendock/templates/design-system/RUN.md
doctor:
  - id: design-system-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/design-system/README.md) { exit 0 } else { exit 1 }"
  - id: design-system-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: design-system-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/design-system/DESIGN_SYSTEM_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: design-system-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-design-system/SKILL.md) { exit 0 } else { exit 1 }"
  - id: design-system-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/design-system/RUN.md) { exit 0 } else { exit 1 }"
