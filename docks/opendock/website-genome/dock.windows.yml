opendock: 1
summary: 공개 웹사이트의 시각·상호작용 체계를 출처와 관찰 근거로 분해해 재사용 가능한 디자인 유전체로 기록하는 분석 dock.
readme: DOCK.md
logo: logo.png
tags:
  - website
  - analysis
  - design
  - tokens
  - responsive
  - accessibility
files:
  - from: files/.opendock/docks/website-genome/README.md
    to: .opendock/docks/website-genome/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/website-genome/WEBSITE_GENOME_PLAYBOOK.md
    to: .opendock/docks/website-genome/WEBSITE_GENOME_PLAYBOOK.md
  - from: files/.agents/skills/opendock-website-genome/SKILL.md
    to: .agents/skills/opendock-website-genome/SKILL.md
  - from: files/.opendock/templates/website-genome/RUN.md
    to: .opendock/templates/website-genome/RUN.md
doctor:
  - id: website-genome-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/website-genome/README.md) { exit 0 } else { exit 1 }"
  - id: website-genome-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: website-genome-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/website-genome/WEBSITE_GENOME_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: website-genome-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-website-genome/SKILL.md) { exit 0 } else { exit 1 }"
  - id: website-genome-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/website-genome/RUN.md) { exit 0 } else { exit 1 }"
