opendock: 1
summary: 공개 웹사이트의 시각·상호작용 체계를 출처와 관찰 근거로 분해해 재사용 가능한 디자인 유전체로 기록하는 분석 dock.
readme: DOCK.md
logo: logo.png
tags:
  - website
  - analysis
  - design
  - tokens
  - responsive
  - accessibility
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/WEBSITE_GENOME_PLAYBOOK.md
    to: WEBSITE_GENOME_PLAYBOOK.md
  - from: files/.agents/skills/opendock-website-genome/SKILL.md
    to: .agents/skills/opendock-website-genome/SKILL.md
  - from: files/.agents/workflows/opendock-website-genome/quality-gate.md
    to: .agents/workflows/opendock-website-genome/quality-gate.md
  - from: files/.opendock/templates/website-genome/RUN.md
    to: .opendock/templates/website-genome/RUN.md
  - from: files/.opendock/harness/opendock__website-genome/check.mjs
    to: .opendock/harness/opendock__website-genome/check.mjs
doctor:
  - id: website-genome-readme
    check: test -f README.md
  - id: website-genome-agents
    check: test -f AGENTS.md
  - id: website-genome-harness-doc
    check: test -f HARNESS.md
  - id: website-genome-playbook
    check: test -f WEBSITE_GENOME_PLAYBOOK.md
  - id: website-genome-skill
    check: test -f .agents/skills/opendock-website-genome/SKILL.md
  - id: website-genome-workflow
    check: test -f .agents/workflows/opendock-website-genome/quality-gate.md
  - id: website-genome-run-template
    check: test -f .opendock/templates/website-genome/RUN.md
  - id: website-genome-harness-script
    check: test -f .opendock/harness/opendock__website-genome/check.mjs
