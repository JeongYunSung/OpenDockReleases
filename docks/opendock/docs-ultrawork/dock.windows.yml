opendock: 1
id: opendock/docs-ultrawork
summary: Documentation quality gate for markdown hygiene, links, headings, code fences, quick starts, CLI drift, and multilingual sync.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - docs
  - markdown
  - readme
  - i18n
commands:
  check:
    description: Run the docs-ultrawork quality gate.
    file: .opendock/harness/opendock__docs-ultrawork/check.mjs
    runner: node
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.opendock/harness/opendock__docs-ultrawork/check.mjs
    to: .opendock/harness/opendock__docs-ultrawork/check.mjs
  - from: files/.opendock/harness/opendock__docs-ultrawork/check.sh
    to: .opendock/harness/opendock__docs-ultrawork/check.sh
  - from: files/.opendock/harness/opendock__docs-ultrawork/check.ps1
    to: .opendock/harness/opendock__docs-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-docs-ultrawork/SKILL.md
    to: .agents/skills/opendock-docs-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-docs-ultrawork.mdc
    to: .cursor/rules/opendock-docs-ultrawork.mdc
  - from: files/.agents/workflows/opendock-docs-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-docs-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-docs-ultrawork/quality-gate.md
    to: .claude/commands/opendock-docs-ultrawork/quality-gate.md
  - from: files/.agents/hooks/opendock-docs-ultrawork/hook.json
    to: .agents/hooks/opendock-docs-ultrawork/hook.json
doctor:
  - id: harness-doc
    check: "node -e \"process.exit(require('node:fs').existsSync('HARNESS.md') ? 0 : 1)\""
  - id: harness-script
    check: "node -e \"process.exit(require('node:fs').existsSync('.opendock/harness/opendock__docs-ultrawork/check.mjs') ? 0 : 1)\""
  - id: skill
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/skills/opendock-docs-ultrawork/SKILL.md') ? 0 : 1)\""
  - id: workflow
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/workflows/opendock-docs-ultrawork/quality-gate.md') ? 0 : 1)\""
  - id: hook
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/hooks/opendock-docs-ultrawork/hook.json') ? 0 : 1)\""
