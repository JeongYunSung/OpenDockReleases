opendock: 1
summary: code-review-graph와 codectx CLI를 프로젝트 전용로 설치해 필요한 코드 맥락을 찾는 도구 Dock.
readme: DOCK.md
logo: logo.png
tags:
  - context-engineering
  - code-graph
  - code-review-graph
  - codectx
  - agent-context
  - repository-map
requires:
  runtimes:
    python: ">=3.11.0 <3.14.0"
tools:
  code-review-graph:
    manager: pip
    package: code-review-graph
    version: "2.3.6"
    commands:
      - code-review-graph
  codectx:
    manager: pip
    package: codectx
    version: "0.3.0"
    commands:
      - codectx
permissions:
  - code-review-graph --help
  - codectx --help
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/AGENTS.md
    to: CLAUDE.md
  - from: files/AGENTS.md
    to: GEMINI.md
  - from: files/.opendock/docks/context-engineering/README.md
    to: .opendock/docks/context-engineering/README.md
  - from: files/.opendock/docks/context-engineering/CONTEXT_ENGINEERING.md
    to: .opendock/docks/context-engineering/CONTEXT_ENGINEERING.md
  - from: files/.opendock/docks/context-engineering/CONTEXT_PACK.md
    to: .opendock/docks/context-engineering/CONTEXT_PACK.md
doctor:
  - id: code-review-graph-cli
    run: code-review-graph --help
  - id: codectx-cli
    run: codectx --help
  - id: context-engineering-docs
    check: test -f .opendock/docks/context-engineering/README.md
