opendock: 1
summary: AI 도구-browser CLI를 프로젝트 전용로 설치하고 안전한 브라우저 자동화 사용 경로를 제공하는 도구 Dock.
readme: DOCK.md
logo: logo.png
tags:
  - browser-agent
  - browser-automation
  - agent-browser
  - qa
  - web-testing
  - research
requires:
  runtimes:
    node: ">=24.0.0 <25.0.0"
    npm: ">=10.0.0"
tools:
  agent-browser:
    manager: npm
    package: agent-browser
    version: "0.31.1"
    commands:
      - agent-browser
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/AGENTS.md
    to: CLAUDE.md
  - from: files/AGENTS.md
    to: GEMINI.md
  - from: files/.opendock/docks/browser-agent/README.md
    to: .opendock/docks/browser-agent/README.md
  - from: files/.opendock/docks/browser-agent/BROWSER_AGENT.md
    to: .opendock/docks/browser-agent/BROWSER_AGENT.md
  - from: files/.opendock/docks/browser-agent/BROWSER_AGENT_RUN.md
    to: .opendock/docks/browser-agent/BROWSER_AGENT_RUN.md
doctor:
  - id: agent-browser-cli
    run: agent-browser --version
  - id: browser-agent-docs
    check: test -f .opendock/docks/browser-agent/README.md
