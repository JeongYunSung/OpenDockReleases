opendock: 1
id: opendock/figma-ultrawork
summary: Figma MCP quality gate aligned to DESIGN.md plus hard UI checks.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - figma
  - mcp
  - design
  - ui
  - accessibility
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.agents/skills/opendock-figma-ultrawork/SKILL.md
    to: .agents/skills/opendock-figma-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-figma-ultrawork.mdc
    to: .cursor/rules/opendock-figma-ultrawork.mdc
  - from: files/.agents/workflows/opendock-figma-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-figma-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-figma-ultrawork/quality-gate.md
    to: .claude/commands/opendock-figma-ultrawork/quality-gate.md
doctor:
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath 'HARNESS.md') { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath '.agents/skills/opendock-figma-ultrawork/SKILL.md') { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath '.agents/workflows/opendock-figma-ultrawork/quality-gate.md') { exit 0 } else { exit 1 }"
