opendock: 1
summary: 검색 의도, 메타데이터, 콘텐츠 구조, 내부 링크, technical SEO, 측정 계획을 점검하는 성장 dock.
readme: DOCK.md
logo: logo.png
tags:
  - seo
  - growth
  - metadata
  - content
  - search
  - analytics
  - sitemap
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/.opendock/docks/seo-growth/README.md
    to: .opendock/docks/seo-growth/README.md
  - from: files/.opendock/docks/seo-growth/SEO_GROWTH.md
    to: .opendock/docks/seo-growth/SEO_GROWTH.md
  - from: files/.opendock/templates/seo-growth/SEO_RUN.md
    to: .opendock/templates/seo-growth/SEO_RUN.md
  - from: files/.agents/skills/opendock-seo-growth/SKILL.md
    to: .agents/skills/opendock-seo-growth/SKILL.md
doctor:
  - id: domain-guide
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/seo-growth/SEO_GROWTH.md) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/seo-growth/SEO_RUN.md) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-seo-growth/SKILL.md) { exit 0 } else { exit 1 }"
