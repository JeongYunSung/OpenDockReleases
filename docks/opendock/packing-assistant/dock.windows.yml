opendock: 1
summary: 목적지·날씨·활동·수하물 제약을 수량 기반 체크리스트, 재착용·세탁과 현지 구매 계획으로 바꾸는 짐싸기 품질 게이트.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - packing
  - checklist
  - baggage
  - weather
  - planning
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/PACKING_PLAYBOOK.md
    to: PACKING_PLAYBOOK.md
  - from: files/.agents/skills/opendock-packing-assistant/SKILL.md
    to: .agents/skills/opendock-packing-assistant/SKILL.md
  - from: files/.agents/workflows/opendock-packing-assistant/quality-gate.md
    to: .agents/workflows/opendock-packing-assistant/quality-gate.md
  - from: files/.opendock/templates/packing-assistant
    to: .opendock/templates/packing-assistant
  - from: files/.opendock/harness/opendock__packing-assistant
    to: .opendock/harness/opendock__packing-assistant
doctor:
  - id: packing-assistant-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath README.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath PACKING_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-packing-assistant/SKILL.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-packing-assistant/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/packing-assistant/RUN.md) { exit 0 } else { exit 1 }"
  - id: packing-assistant-harness
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__packing-assistant/check.mjs) { exit 0 } else { exit 1 }"
