opendock: 1
summary: 목적지·날씨·활동·수하물 제약을 수량 기반 체크리스트, 재착용·세탁과 현지 구매 계획으로 바꾸는 짐싸기 작업공간.
readme: DOCK.md
logo: logo.png
tags:
  - travel
  - packing
  - checklist
  - baggage
  - weather
  - planning
files:
  - from: files/.opendock/docks/packing-assistant/README.md
    to: .opendock/docks/packing-assistant/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/packing-assistant/PACKING_PLAYBOOK.md
    to: .opendock/docks/packing-assistant/PACKING_PLAYBOOK.md
  - from: files/.agents/skills/opendock-packing-assistant/SKILL.md
    to: .agents/skills/opendock-packing-assistant/SKILL.md
  - from: files/.opendock/templates/packing-assistant
    to: .opendock/templates/packing-assistant
doctor:
  - id: packing-assistant-readme
    check: test -f .opendock/docks/packing-assistant/README.md
  - id: packing-assistant-agents
    check: test -f AGENTS.md
  - id: packing-assistant-playbook
    check: test -f .opendock/docks/packing-assistant/PACKING_PLAYBOOK.md
  - id: packing-assistant-skill
    check: test -f .agents/skills/opendock-packing-assistant/SKILL.md
  - id: packing-assistant-template
    check: test -f .opendock/templates/packing-assistant/RUN.md
