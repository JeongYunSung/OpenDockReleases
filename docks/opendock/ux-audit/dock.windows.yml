opendock: 1
summary: 사용자 경험 문제를 근거와 심각도로 분류하고 접근성, 반응형, 카피까지 실행 가능한 개선안으로 정리하는 UX 감사 dock.
readme: DOCK.md
logo: logo.png
tags:
  - ux
  - audit
  - accessibility
  - responsive
  - usability
  - evidence
files:
  - from: files/.opendock/docks/ux-audit/README.md
    to: .opendock/docks/ux-audit/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/ux-audit/UX_AUDIT_PLAYBOOK.md
    to: .opendock/docks/ux-audit/UX_AUDIT_PLAYBOOK.md
  - from: files/.agents/skills/opendock-ux-audit/SKILL.md
    to: .agents/skills/opendock-ux-audit/SKILL.md
  - from: files/.opendock/templates/ux-audit/RUN.md
    to: .opendock/templates/ux-audit/RUN.md
doctor:
  - id: ux-audit-readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/ux-audit/README.md) { exit 0 } else { exit 1 }"
  - id: ux-audit-agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: ux-audit-playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/docks/ux-audit/UX_AUDIT_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: ux-audit-skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-ux-audit/SKILL.md) { exit 0 } else { exit 1 }"
  - id: ux-audit-run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/ux-audit/RUN.md) { exit 0 } else { exit 1 }"
