opendock: 1
summary: 구독, 갱신, 문서 메타데이터, 보증, 반복 업무를 개인정보 최소화 원칙으로 관리하는 dock.
readme: DOCK.md
logo: logo.png
tags:
  - life-admin
  - subscriptions
  - renewals
  - documents
  - warranty
  - reminders
  - privacy
files:
  - from: files/.opendock/docks/life-admin/README.md
    to: .opendock/docks/life-admin/README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/.opendock/docks/life-admin/LIFE_ADMIN_PLAYBOOK.md
    to: .opendock/docks/life-admin/LIFE_ADMIN_PLAYBOOK.md
  - from: files/.agents/skills/opendock-life-admin/SKILL.md
    to: .agents/skills/opendock-life-admin/SKILL.md
  - from: files/.opendock/templates/life-admin
    to: .opendock/templates/life-admin
doctor:
  - id: life-admin-readme
    check: test -f .opendock/docks/life-admin/README.md
  - id: life-admin-agents
    check: test -f AGENTS.md
  - id: life-admin-playbook
    check: test -f .opendock/docks/life-admin/LIFE_ADMIN_PLAYBOOK.md
  - id: life-admin-skill
    check: test -f .agents/skills/opendock-life-admin/SKILL.md
  - id: life-admin-run-template
    check: test -f .opendock/templates/life-admin/RUN.md
