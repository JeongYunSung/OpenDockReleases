opendock: 1
summary: 프로젝트의 AI 협업 context, 규칙, workflow, 품질 gate, 보안과 onboarding을 .ai/ 범위에서 검증합니다.
readme: DOCK.md
logo: logo.png
tags:
  - ai-project
  - project-context
  - onboarding
  - workflow
  - governance
  - harness
requires:
  runtimes:
    node: ">=22.0.0 <25.0.0"
files:
  - from: files/README.md
    to: README.md
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/AI_PROJECT_STARTER_PLAYBOOK.md
    to: AI_PROJECT_STARTER_PLAYBOOK.md
  - from: files/.agents/skills/opendock-ai-project-starter/SKILL.md
    to: .agents/skills/opendock-ai-project-starter/SKILL.md
  - from: files/.agents/workflows/opendock-ai-project-starter/quality-gate.md
    to: .agents/workflows/opendock-ai-project-starter/quality-gate.md
  - from: files/.opendock/templates/ai-project-starter/RUN.md
    to: .opendock/templates/ai-project-starter/RUN.md
  - from: files/.opendock/harness/opendock__ai-project-starter/check.mjs
    to: .opendock/harness/opendock__ai-project-starter/check.mjs
doctor:
  - id: readme
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath README.md) { exit 0 } else { exit 1 }"
  - id: agents
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AGENTS.md) { exit 0 } else { exit 1 }"
  - id: harness-doc
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath HARNESS.md) { exit 0 } else { exit 1 }"
  - id: playbook
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath AI_PROJECT_STARTER_PLAYBOOK.md) { exit 0 } else { exit 1 }"
  - id: skill
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/skills/opendock-ai-project-starter/SKILL.md) { exit 0 } else { exit 1 }"
  - id: workflow
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .agents/workflows/opendock-ai-project-starter/quality-gate.md) { exit 0 } else { exit 1 }"
  - id: run-template
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/templates/ai-project-starter/RUN.md) { exit 0 } else { exit 1 }"
  - id: harness
    check: powershell -NoProfile -NonInteractive -Command "if (Test-Path -LiteralPath .opendock/harness/opendock__ai-project-starter/check.mjs) { exit 0 } else { exit 1 }"

