opendock: 1
summary: 프로젝트의 AI 협업 맥락, 규칙, 작업 절차, 품질 기준, 보안과 onboarding을 .ai/ 범위에 정리합니다.
readme: DOCK.md
logo: logo.png
tags:
  - ai-project
