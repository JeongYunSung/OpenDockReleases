    to: .opendock/docks/ai-project-starter/AI_PROJECT_STARTER_PLAYBOOK.md
  - from: files/.agents/skills/opendock-ai-project-starter/SKILL.md
    to: .agents/skills/opendock-ai-project-starter/SKILL.md
  - from: files/.opendock/templates/ai-project-starter/RUN.md
    to: .opendock/templates/ai-project-starter/RUN.md
doctor:
  - id: readme
    check: test -f .opendock/docks/ai-project-starter/README.md
  - id: agents
    check: test -f AGENTS.md
  - id: playbook
    check: test -f .opendock/docks/ai-project-starter/AI_PROJECT_STARTER_PLAYBOOK.md
  - id: skill
    check: test -f .agents/skills/opendock-ai-project-starter/SKILL.md
  - id: run-template
    check: test -f .opendock/templates/ai-project-starter/RUN.md
