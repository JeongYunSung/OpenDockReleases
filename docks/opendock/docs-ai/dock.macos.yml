opendock: 1
id: opendock/docs-ai
summary: Documentation standards, API doc templates, changelogs, and release notes.
readme: DOCK.md
logo: logo.png
tags:
  - documentation
  - release-notes
  - api-docs
  - writing
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/.agents/skills/opendock-docs-ai/SKILL.md
    to: .agents/skills/opendock-docs-ai/SKILL.md
  - from: files/.codex/skills/opendock-docs-ai/SKILL.md
    to: .codex/skills/opendock-docs-ai/SKILL.md
  - from: files/.claude/skills/opendock-docs-ai/SKILL.md
    to: .claude/skills/opendock-docs-ai/SKILL.md
  - from: files/.cursor/rules/opendock-docs-ai.mdc
    to: .cursor/rules/opendock-docs-ai.mdc
  - from: files/PROMPTS.md
    to: PROMPTS.md
  - from: files/README.md
    to: README.md
  - from: files/DOCS_STYLE_GUIDE.md
    to: DOCS_STYLE_GUIDE.md
  - from: files/API_DOC_TEMPLATE.md
    to: API_DOC_TEMPLATE.md
  - from: files/CHANGELOG_TEMPLATE.md
    to: CHANGELOG_TEMPLATE.md
  - from: files/RELEASE_NOTES.md
    to: RELEASE_NOTES.md
doctor:
  - id: agents-md
    check: test -f AGENTS.md
  - id: claude-md
    check: test -f CLAUDE.md
  - id: gemini-md
    check: test -f GEMINI.md
  - id: codex-skill
    check: test -f .codex/skills/opendock-docs-ai/SKILL.md
  - id: claude-skill
    check: test -f .claude/skills/opendock-docs-ai/SKILL.md
  - id: cursor-rule
    check: test -f .cursor/rules/opendock-docs-ai.mdc
  - id: docs-style-guide-md
    check: test -f DOCS_STYLE_GUIDE.md
  - id: api-doc-template-md
    check: test -f API_DOC_TEMPLATE.md
  - id: changelog-template-md
    check: test -f CHANGELOG_TEMPLATE.md
  - id: prompts-md
    check: test -f PROMPTS.md
