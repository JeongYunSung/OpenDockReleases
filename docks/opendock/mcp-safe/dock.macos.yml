opendock: 1
id: opendock/mcp-safe
summary: Security-first MCP inventory, config examples, and review checklists.
readme: DOCK.md
logo: logo.png
tags:
  - mcp
  - security
  - config
  - review
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/.agents/skills/opendock-mcp-safe/SKILL.md
    to: .agents/skills/opendock-mcp-safe/SKILL.md
  - from: files/.codex/skills/opendock-mcp-safe/SKILL.md
    to: .codex/skills/opendock-mcp-safe/SKILL.md
  - from: files/.claude/skills/opendock-mcp-safe/SKILL.md
    to: .claude/skills/opendock-mcp-safe/SKILL.md
  - from: files/.cursor/rules/opendock-mcp-safe.mdc
    to: .cursor/rules/opendock-mcp-safe.mdc
  - from: files/README.md
    to: README.md
  - from: files/MCP.md
    to: MCP.md
  - from: files/.opendock/mcp/approved-servers.yml
    to: .opendock/mcp/approved-servers.yml
  - from: files/.opendock/mcp/security-checklist.md
    to: .opendock/mcp/security-checklist.md
  - from: files/.opendock/mcp/cursor.mcp.json
    to: .opendock/mcp/cursor.mcp.json
  - from: files/.opendock/mcp/claude.mcp.json
    to: .opendock/mcp/claude.mcp.json
  - from: files/.opendock/mcp/codex.config.example.toml
    to: .opendock/mcp/codex.config.example.toml
doctor:
  - id: agents-md
    check: test -f AGENTS.md
  - id: claude-md
    check: test -f CLAUDE.md
  - id: gemini-md
    check: test -f GEMINI.md
  - id: codex-skill
    check: test -f .codex/skills/opendock-mcp-safe/SKILL.md
  - id: claude-skill
    check: test -f .claude/skills/opendock-mcp-safe/SKILL.md
  - id: cursor-rule
    check: test -f .cursor/rules/opendock-mcp-safe.mdc
  - id: mcp-guide
    check: test -f MCP.md
  - id: approved-servers
    check: test -f .opendock/mcp/approved-servers.yml
  - id: security-checklist
    check: test -f .opendock/mcp/security-checklist.md
  - id: codex-template
    check: test -f .opendock/mcp/codex.config.example.toml
