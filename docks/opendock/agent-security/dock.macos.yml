    to: HARNESS.md
  - from: files/SECURITY.md
    to: SECURITY.md
  - from: files/.opendock/templates/agent-security/SECURITY_REVIEW.md
    to: .opendock/templates/agent-security/SECURITY_REVIEW.md
  - from: files/.opendock/harness/opendock__agent-security/check.mjs
    to: .opendock/harness/opendock__agent-security/check.mjs
  - from: files/.opendock/harness/opendock__agent-security/check.sh
    to: .opendock/harness/opendock__agent-security/check.sh
  - from: files/.opendock/harness/opendock__agent-security/check.ps1
