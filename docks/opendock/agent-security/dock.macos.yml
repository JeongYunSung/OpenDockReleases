doctor:
  - id: security-contract
    check: test -f SECURITY.md
  - id: harness-doc
    check: test -f HARNESS.md
  - id: harness-script
    check: test -f .opendock/harness/opendock__agent-security/check.mjs
  - id: review-template
    check: test -f .opendock/templates/agent-security/SECURITY_REVIEW.md
  - id: skill
    check: test -f .agents/skills/opendock-agent-security/SKILL.md
  - id: workflow
    check: test -f .agents/workflows/opendock-agent-security/quality-gate.md
  - id: hook
    check: test -f .agents/hooks/opendock-agent-security/hook.json
