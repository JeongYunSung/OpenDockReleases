opendock: 1
id: opendock/creative-gen-ultrawork
summary: Creative generation loop for image, logo, favicon, video, audio, and asset analysis deliverables.
readme: DOCK.md
logo: logo.png
tags:
  - ultrawork
  - generation
  - image
  - logo
  - favicon
  - video
  - audio
  - assets
commands:
  check:
    description: Run the creative-gen-ultrawork quality gate.
    file: .opendock/harness/opendock__creative-gen-ultrawork/check.mjs
    runner: node
files:
  - from: files/AGENTS.md
    to: AGENTS.md
  - from: files/CLAUDE.md
    to: CLAUDE.md
  - from: files/GEMINI.md
    to: GEMINI.md
  - from: files/README.md
    to: README.md
  - from: files/HARNESS.md
    to: HARNESS.md
  - from: files/.opendock/templates/creative-gen/GENERATION_BRIEF.md
    to: .opendock/templates/creative-gen/GENERATION_BRIEF.md
  - from: files/.opendock/templates/creative-gen/OUTPUT_MANIFEST.md
    to: .opendock/templates/creative-gen/OUTPUT_MANIFEST.md
  - from: files/.opendock/harness/opendock__creative-gen-ultrawork/check.mjs
    to: .opendock/harness/opendock__creative-gen-ultrawork/check.mjs
  - from: files/.opendock/harness/opendock__creative-gen-ultrawork/check.sh
    to: .opendock/harness/opendock__creative-gen-ultrawork/check.sh
  - from: files/.opendock/harness/opendock__creative-gen-ultrawork/check.ps1
    to: .opendock/harness/opendock__creative-gen-ultrawork/check.ps1
  - from: files/.agents/skills/opendock-creative-gen-ultrawork/SKILL.md
    to: .agents/skills/opendock-creative-gen-ultrawork/SKILL.md
  - from: files/.cursor/rules/opendock-creative-gen-ultrawork.mdc
    to: .cursor/rules/opendock-creative-gen-ultrawork.mdc
  - from: files/.agents/workflows/opendock-creative-gen-ultrawork/quality-gate.md
    to: .agents/workflows/opendock-creative-gen-ultrawork/quality-gate.md
  - from: files/.claude/commands/opendock-creative-gen-ultrawork/quality-gate.md
    to: .claude/commands/opendock-creative-gen-ultrawork/quality-gate.md
  - from: files/.agents/hooks/opendock-creative-gen-ultrawork/hook.json
    to: .agents/hooks/opendock-creative-gen-ultrawork/hook.json
doctor:
  - id: generation-brief-template
    check: "node -e \"process.exit(require('node:fs').existsSync('.opendock/templates/creative-gen/GENERATION_BRIEF.md') ? 0 : 1)\""
  - id: output-manifest-template
    check: "node -e \"process.exit(require('node:fs').existsSync('.opendock/templates/creative-gen/OUTPUT_MANIFEST.md') ? 0 : 1)\""
  - id: harness-doc
    check: "node -e \"process.exit(require('node:fs').existsSync('HARNESS.md') ? 0 : 1)\""
  - id: harness-script
    check: "node -e \"process.exit(require('node:fs').existsSync('.opendock/harness/opendock__creative-gen-ultrawork/check.mjs') ? 0 : 1)\""
  - id: skill
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/skills/opendock-creative-gen-ultrawork/SKILL.md') ? 0 : 1)\""
  - id: workflow
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/workflows/opendock-creative-gen-ultrawork/quality-gate.md') ? 0 : 1)\""
  - id: hook
    check: "node -e \"process.exit(require('node:fs').existsSync('.agents/hooks/opendock-creative-gen-ultrawork/hook.json') ? 0 : 1)\""
